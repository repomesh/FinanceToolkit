# This file is meant for deploying the MCP server using Docker Compose. This, together with
# the Dockerfile, makes it possible to create a localhost deployment of the MCP server,
# which can be used for testing and development purposes or for running on a server.
#
# The server is currently already live at financetoolkit.jeroenbouma.com/mcp

services:
  finance-toolkit-mcp:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8000"
      FT_MCP_SECRET_KEY: "${FT_MCP_SECRET_KEY}"
    volumes:
      - ft_cache:/root/.config/financetoolkit
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  ft_cache:
