# ──────────────────────────────────────────────────────────────────────────────
# Category descriptions shown by the list_categories utility tool
# Keys must match the index_category (or module_name fallback) used when
# registering each router group below.
# ──────────────────────────────────────────────────────────────────────────────
category_descriptions:
  ratios:                  "Pre-computed financial ratios (PE, EPS, ROE, margins, liquidity, valuation). Use INSTEAD of raw financial statements."
  performance:             "Risk-adjusted returns (Sharpe, Sortino, alpha, beta, CAPM, Fama-French). No need to fetch price data first."
  risk:                    "Risk metrics (VaR, CVaR, GARCH, drawdown, skewness, kurtosis). No need to fetch price data first."
  models:                  "Financial models (DCF/intrinsic value, WACC, DuPont, Altman Z, Piotroski). Pre-computed."
  technicals:              "Technical indicators (RSI, MACD, Bollinger Bands, moving averages). Applied to price data automatically."
  options:                 "Option pricing and Greeks (Black-Scholes, binomial, delta, gamma, theta, vega, implied vol)."
  government_economy:      "Government fiscal metrics by country (debt, deficit, expenditure, revenue, tax). Use countries= param."
  general_economy:         "Macroeconomic indicators by country (GDP, CPI, inflation, trade, investment, consumption, confidence). Use countries= param."
  environment:             "Environmental and ESG data. Carbon footprint and renewable energy use countries=; ESG scores use tickers=."
  jobs_and_society:        "Labour and social metrics by country (unemployment, population, poverty, income inequality). Use countries= param."
  interest_rates:          "Interest rate data — central bank rates, government/corporate bond yields, EURIBOR, short/long-term rates. Use countries= param."
  fixed_income_valuations: "Bond and derivative valuation calculations (duration, present value, yield-to-maturity, derivative pricing)."
  discovery:               "Market discovery (stock/ETF/crypto lists, screener, gainers/losers, sector performance). No tickers needed."
  toolkit:                 "Raw data (historical prices, financial statements, company profile, quotes). Use ratios/performance/risk tools for computed metrics."

# ──────────────────────────────────────────────────────────────────────────────
# Router group specifications
# Each entry becomes one MCP master tool.
#
# Fields:
#   tool_name         — MCP tool function name (must be unique)
#   display_name      — Human-friendly name for descriptions and logs
#   module_name       — Key in module_class_map (or "mixed" for multi-module)
#   category          — Routing category (see categories section above)
#   collect_method    — collect_* method to call when indicator="all" (optional)
#   method_override   — Explicit ordered list of indicator methods (optional;
#                       if omitted, methods are discovered from collect_method
#                       or by scanning all get_* on the controller class)
#   method_to_module  — Per-indicator module/category map (required for mixed)
#   index_category    — Key to use in the TOOL_INDEX (defaults to module_name;
#                       set this for economics/fixedincome sub-groups so they
#                       appear as separate categories in list_categories)
#   use_direct_methods — if true, method_override is populated from
#                       the direct_methods list above (get_toolkit_data only)
# ──────────────────────────────────────────────────────────────────────────────
tool_groups:

  # ── Ratios (5 sub-groups) ────────────────────────────────────────────────
  - tool_name:      "get_efficiency_ratios"
    display_name:   "Efficiency Ratios"
    description:    "Pre-computed efficiency ratios (asset turnover, inventory turnover, days sales outstanding, days payable outstanding, cash conversion cycle). Requires tickers='AAPL' — use comma-separated values for multiple tickers. Use instead of raw financial statements. Supports quarterly=true and start_date/end_date."
    module_name:    "ratios"
    category:       "ticker"
    collect_method: "collect_efficiency_ratios"

  - tool_name:      "get_liquidity_ratios"
    display_name:   "Liquidity Ratios"
    description:    "Pre-computed liquidity ratios (current ratio, quick ratio, cash ratio, working capital). Requires tickers='AAPL' — use comma-separated values for multiple tickers. Use instead of raw financial statements. Supports quarterly=true and start_date/end_date."
    module_name:    "ratios"
    category:       "ticker"
    collect_method: "collect_liquidity_ratios"

  - tool_name:      "get_profitability_ratios"
    display_name:   "Profitability Ratios"
    description:    "Pre-computed profitability ratios (gross margin, operating margin, net margin, ROE, ROA, ROIC, ROCE). Requires tickers='AAPL' — use comma-separated values for multiple tickers. Use instead of raw financial statements. Supports quarterly=true and start_date/end_date."
    module_name:    "ratios"
    category:       "ticker"
    collect_method: "collect_profitability_ratios"

  - tool_name:      "get_solvency_ratios"
    display_name:   "Solvency Ratios"
    description:    "Pre-computed solvency ratios (debt-to-equity, interest coverage, debt-to-assets, net debt to EBITDA). Requires tickers='AAPL' — use comma-separated values for multiple tickers. Use instead of raw financial statements. Supports quarterly=true and start_date/end_date."
    module_name:    "ratios"
    category:       "ticker"
    collect_method: "collect_solvency_ratios"

  - tool_name:      "get_valuation_ratios"
    display_name:   "Valuation Ratios"
    description:    "Pre-computed valuation ratios (P/E, EPS, EV/EBITDA, EV/EBIT, P/B, P/S, PEG, dividend yield, FCF yield, market cap). Requires tickers='AAPL' — use comma-separated values for multiple tickers. Use instead of raw financial statements. Supports quarterly=true and start_date/end_date."
    module_name:    "ratios"
    category:       "ticker"
    collect_method: "collect_valuation_ratios"

  # ── Technicals (4 sub-groups) ────────────────────────────────────────────
  - tool_name:      "get_breadth_indicators"
    display_name:   "Breadth Indicators"
    description:    "Market breadth technical indicators (McClellan Oscillator, OBV, Advance/Decline Line, Chaikin). Applied to price data automatically — no need to fetch prices first. Requires tickers='AAPL' — use comma-separated values for multiple tickers."
    module_name:    "technicals"
    category:       "ticker"
    collect_method: "collect_breadth_indicators"

  - tool_name:      "get_momentum_indicators"
    display_name:   "Momentum Indicators"
    description:    "Momentum technical indicators (RSI, MACD, Stochastic Oscillator, Williams %R, Aroon). Applied to price data automatically — no need to fetch prices first. Requires tickers='AAPL' — use comma-separated values for multiple tickers."
    module_name:    "technicals"
    category:       "ticker"
    collect_method: "collect_momentum_indicators"

  - tool_name:      "get_overlap_indicators"
    display_name:   "Overlap Indicators"
    description:    "Overlap technical indicators (SMA, EMA, Bollinger Bands, Keltner Channels). Applied to price data automatically — no need to fetch prices first. Requires tickers='AAPL' — use comma-separated values for multiple tickers."
    module_name:    "technicals"
    category:       "ticker"
    collect_method: "collect_overlap_indicators"

  - tool_name:      "get_volatility_indicators"
    display_name:   "Volatility Indicators"
    description:    "Volatility technical indicators (ATR, True Range). Applied to price data automatically — no need to fetch prices first. Requires tickers='AAPL' — use comma-separated values for multiple tickers."
    module_name:    "technicals"
    category:       "ticker"
    collect_method: "collect_volatility_indicators"

  # ── Single-module ticker tools ───────────────────────────────────────────
  - tool_name:    "get_models"
    display_name: "Financial Models"
    description:  "Pre-computed financial models (WACC, DuPont analysis, Altman Z-Score, Piotroski F-Score, intrinsic value/DCF). Requires tickers='AAPL' — use comma-separated values for multiple tickers. Supports quarterly=true and start_date/end_date."
    module_name:  "models"
    category:     "ticker"

  - tool_name:    "get_performance"
    display_name: "Performance Metrics"
    description:  "Pre-computed risk-adjusted performance metrics (Sharpe ratio, Sortino ratio, Alpha, Beta, CAPM, Fama-French factors). Requires tickers='AAPL' — use comma-separated values for multiple tickers. Does NOT support period='daily'; use weekly, monthly, quarterly, or yearly instead."
    module_name:  "performance"
    category:     "ticker"

  - tool_name:    "get_risk"
    display_name: "Risk Metrics"
    description:  "Pre-computed risk metrics (VaR, CVaR, GARCH volatility, max drawdown, skewness, kurtosis). Requires tickers='AAPL' — use comma-separated values for multiple tickers. Does NOT support period='daily'; use weekly, monthly, quarterly, or yearly instead."
    module_name:  "risk"
    category:     "ticker"

  - tool_name:    "get_options"
    display_name: "Options"
    description:  "Option pricing and Greeks (Black-Scholes model, binomial tree, delta, gamma, theta, vega, rho, implied volatility). Requires tickers='AAPL' — use comma-separated values for multiple tickers."
    module_name:  "options"
    category:     "ticker"

  # ── Economics: Government & Fiscal ──────────────────────────────────────
  # All government debt, deficit, expenditure, revenue, tax, and trust metrics.
  - tool_name:       "get_government_economy"
    display_name:    "Government & Fiscal Metrics"
    description:     "Government fiscal metrics by country (debt, deficit, expenditure, revenue, tax revenue, trust in government). Requires countries='United States' — use comma-separated values for multiple countries. Do NOT use tickers= for this tool. Supports start_date/end_date and quarterly=true."
    module_name:     "economics"
    category:        "standalone"
    index_category:  "government_economy"
    method_override:
      - "get_government_debt"
      - "get_government_debt_to_gdp_ratio"
      - "get_government_deficit"
      - "get_government_deficit_to_gdp_ratio"
      - "get_government_expenditure"
      - "get_government_expenditure_to_gdp_ratio"
      - "get_government_revenue"
      - "get_government_revenue_to_gdp_ratio"
      - "get_government_tax_revenue"
      - "get_government_tax_revenue_to_gdp_ratio"
      - "get_trust_in_government"

  # ── Economics: General Macroeconomic Indicators ──────────────────────────
  # GDP, CPI, inflation, trade balances, investment, consumption,
  # confidence indices, house/rent prices, exchange rates, share prices.
  - tool_name:       "get_general_economy"
    display_name:    "General Economy"
    description:     "Macroeconomic indicators by country (GDP, CPI, inflation rate, trade balance, imports, exports, investment, consumption, business/consumer confidence, house prices, rent prices, exchange rates). Requires countries='United States' — use comma-separated values for multiple countries. Do NOT use tickers= for this tool. Supports start_date/end_date and quarterly=true."
    module_name:     "economics"
    category:        "standalone"
    index_category:  "general_economy"
    method_override:
      - "get_business_confidence_index"
      - "get_composite_leading_indicator"
      - "get_consumer_confidence_index"
      - "get_consumer_price_index"
      - "get_current_account_balance"
      - "get_current_account_balance_to_gdp_ratio"
      - "get_exchange_rates"
      - "get_exports"
      - "get_exports_to_gdp_ratio"
      - "get_fixed_investment"
      - "get_fixed_investment_to_gdp_ratio"
      - "get_gross_domestic_product"
      - "get_gross_domestic_product_deflator"
      - "get_house_prices"
      - "get_imports"
      - "get_imports_to_gdp_ratio"
      - "get_inflation_rate"
      - "get_investment"
      - "get_investment_to_gdp_ratio"
      - "get_money_supply"
      - "get_rent_prices"
      - "get_share_prices"
      - "get_total_consumption"
      - "get_total_consumption_to_gdp_ratio"

  # ── Environment & ESG (mixed: economics + toolkit) ───────────────────────
  # Carbon footprint and renewable energy come from Economics (use countries=).
  # ESG scores come from Toolkit (use tickers=). This is the only tool where
  # BOTH tickers= and countries= are accepted.
  - tool_name:       "get_environment"
    display_name:    "Environment & ESG"
    description:     "Environmental and ESG data. For ESG scores (E, S, G ratings) use tickers='AAPL'. For carbon footprint and renewable energy data use countries='United States'. This is the only tool that accepts BOTH tickers= and countries= depending on the indicator."
    module_name:     "mixed"
    category:        "mixed"
    index_category:  "environment"
    method_override:
      - "get_carbon_footprint"
      - "get_renewable_energy"
      - "get_esg_scores"
    method_to_module:
      get_carbon_footprint:
        module:   "economics"
        category: "standalone"
      get_renewable_energy:
        module:   "economics"
        category: "standalone"
      get_esg_scores:
        module:   "toolkit"
        category: "toolkit"

  # ── Economics: Jobs & Society ────────────────────────────────────────────
  # Unemployment, labour productivity, population, poverty, income inequality.
  - tool_name:       "get_jobs_and_society"
    display_name:    "Jobs & Society"
    description:     "Labour and social metrics by country (unemployment rate, labour productivity, population statistics, poverty rate, income inequality). Requires countries='United States' — use comma-separated values for multiple countries. Do NOT use tickers= for this tool. Supports start_date/end_date and quarterly=true."
    module_name:     "economics"
    category:        "standalone"
    index_category:  "jobs_and_society"
    method_override:
      - "get_income_inequality"
      - "get_labour_productivity"
      - "get_population_statistics"
      - "get_poverty_rate"
      - "get_unemployment_rate"

  # ── Interest Rates (mixed: economics + fixedincome) ──────────────────────
  # Short/long-term interest rates and central bank policy from Economics.
  # Government bond yields, ICE BofA corporate bond series, EURIBOR,
  # ECB rates, and Federal Reserve rates from FixedIncome.
  # All indicators use countries= (both modules are CATEGORY_STANDALONE).
  - tool_name:       "get_interest_rates"
    display_name:    "Interest Rates"
    description:     "Interest rate data (central bank policy rates, short/long-term rates, government bond yields, ICE BofA corporate bond series, EURIBOR, ECB rates, Federal Reserve rates). Requires countries='United States' — use comma-separated values for multiple countries. Do NOT use tickers= for this tool. Supports start_date/end_date and quarterly=true."
    module_name:     "mixed"
    category:        "mixed"
    index_category:  "interest_rates"
    method_override:
      - "get_central_bank_policy_rate"
      - "get_short_term_interest_rate"
      - "get_long_term_interest_rate"
      - "get_government_bond_yield"
      - "get_euribor_rates"
      - "get_european_central_bank_rates"
      - "get_federal_reserve_rates"
      - "get_ice_bofa_effective_yield"
      - "get_ice_bofa_option_adjusted_spread"
      - "get_ice_bofa_total_return"
      - "get_ice_bofa_yield_to_worst"
    method_to_module:
      get_central_bank_policy_rate:
        module:   "economics"
        category: "standalone"
      get_short_term_interest_rate:
        module:   "economics"
        category: "standalone"
      get_long_term_interest_rate:
        module:   "economics"
        category: "standalone"
      get_government_bond_yield:
        module:   "fixedincome"
        category: "standalone"
      get_euribor_rates:
        module:   "fixedincome"
        category: "standalone"
      get_european_central_bank_rates:
        module:   "fixedincome"
        category: "standalone"
      get_federal_reserve_rates:
        module:   "fixedincome"
        category: "standalone"
      get_ice_bofa_effective_yield:
        module:   "fixedincome"
        category: "standalone"
      get_ice_bofa_option_adjusted_spread:
        module:   "fixedincome"
        category: "standalone"
      get_ice_bofa_total_return:
        module:   "fixedincome"
        category: "standalone"
      get_ice_bofa_yield_to_worst:
        module:   "fixedincome"
        category: "standalone"

  # ── Fixed Income: Bond & Derivative Valuations ───────────────────────────
  # Computational valuation tools: bond duration, present value,
  # yield-to-maturity, and derivative pricing models.
  - tool_name:       "get_fixed_income_valuations"
    display_name:    "Bond & Derivative Valuations"
    description:     "Bond and derivative valuation calculations (bond duration, present value, yield-to-maturity, derivative pricing). No tickers or countries needed — provide bond/derivative parameters (e.g. face_value, coupon_rate, maturity) directly as arguments."
    module_name:     "fixedincome"
    category:        "standalone"
    index_category:  "fixed_income_valuations"
    method_override:
      - "get_derivative_price"
      - "get_duration"
      - "get_present_value"
      - "get_yield_to_maturity"

  # ── Discovery ────────────────────────────────────────────────────────────
  - tool_name:    "get_discovery"
    display_name: "Market Discovery"
    description:  "Market discovery tools (lists of stocks/ETFs/cryptocurrencies, stock screener, gainers, losers, sector performance, earnings/dividend calendars). No tickers or countries needed."
    module_name:  "discovery"
    category:     "discovery"

  # ── Raw Financial Data (Toolkit direct methods) ──────────────────────────
  # Method list is populated at startup from toolkit_direct_methods above.
  - tool_name:                    "get_toolkit_data"
    display_name:                 "Raw Financial Data"
    description:                  "Raw financial data (historical prices, income statement, balance sheet, cash flow statement, company profile, quotes, analyst estimates, dividend/earnings calendars, statistics). Use this ONLY for raw data needs — for pre-computed ratios, performance, risk, or model metrics use the dedicated tools instead. Requires tickers='AAPL' — use comma-separated values for multiple tickers."
    module_name:                  "toolkit"
    category:                     "toolkit"
    use_direct_methods:   true


# ──────────────────────────────────────────────────────────────────────────────
# Blocked period values per tool
# Some tool groups cannot meaningfully compute results at "daily" granularity
# (e.g. Sharpe Ratio, Beta, CAPM — standard deviation for 1 day is near zero).
# Listing a period here causes the wrapper to return an informative error
# instead of raising a confusing KeyError or returning empty data.
# ──────────────────────────────────────────────────────────────────────────────
blocked_periods:
  get_performance:
    - "daily"
  get_risk:
    - "daily"
